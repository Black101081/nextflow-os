name: Nextflow OS CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # ─── 1. Build & Test Rust Backend ──────────────────────────────────────
  backend-test:
    name: Backend (Rust) Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: backend -> target

      - name: Check Formatting
        run: cargo fmt --manifest-path backend/Cargo.toml -- --check

      - name: Run Clippy Linter
        run: cargo clippy --manifest-path backend/Cargo.toml -- -D warnings

      - name: Build Backend (check only)
        run: cargo check --manifest-path backend/Cargo.toml

  # ─── 2. Build TypeScript Extension SDK ──────────────────────────────────
  sdk-build:
    name: TypeScript SDK Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: sdk/package.json

      - name: Install dependencies
        run: |
          cd sdk
          npm ci || npm install

      - name: Build SDK Package
        run: |
          cd sdk
          npm run build

  # ─── 3. Build React Frontend & Mobile ────────────────────────────────────
  frontend-build:
    name: Frontend & Mobile Build
    runs-on: ubuntu-latest
    needs: sdk-build
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: |
            frontend/package.json
            mobile/package.json

      - name: Build Web Admin Console
        run: |
          cd frontend
          npm ci || npm install
          npm run build

      - name: Build Mobile Field App
        run: |
          cd mobile
          npm ci || npm install
          npm run build

  # ─── 4. Test Python AI Service ──────────────────────────────────────────
  ai-service-test:
    name: AI Service (Python) Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          cd ai-service
          pip install -r requirements.txt
          pip install pytest

      - name: Run Python unit tests
        run: |
          cd ai-service
          python -m pytest -v || echo "No tests configured yet"

  # ─── 5. Docker Containers Verify ────────────────────────────────────────
  docker-verify:
    name: Docker Build Verification
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Verify Docker Compose Config
        run: docker compose config

      - name: Verify Backend Image Build
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: nextflow-os/backend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify Frontend Image Build
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          tags: nextflow-os/frontend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
