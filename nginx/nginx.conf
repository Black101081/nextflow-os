user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    keepalive_timeout 65;

    # Gzip Compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Security Hardening Headers (Doc 92 & 141 Security contract)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Content-Security-Policy "default-src 'self' http: https: ws: wss: data: blob: 'unsafe-inline' 'unsafe-eval'; connect-src 'self' http: https: ws: wss:; frame-ancestors 'self';" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Web Application Firewall (WAF) - Lọc SQLi, XSS, và Path Traversal tại tầng HTTP
    map $query_string $waf_blocked {
        default 0;
        # SQL Injection patterns
        "~*(union|select|insert|cast|drop|alter|--|declare|varchar|concat)" 1;
        # Cross-Site Scripting (XSS) patterns
        "~*(<script|javascript:|eval\(|alert\(|onload=)" 1;
        # Path Traversal patterns
        "~*(\.\./|\.\.\\|/etc/passwd|/boot.ini)" 1;
    }

    # Redirect HTTP (Port 80) sang HTTPS (Port 443)
    server {
        listen 80;
        server_name localhost;
        return 301 https://$host$request_uri;
    }

    # HTTPS Server (Port 443)
    server {
        listen 443 ssl;
        server_name localhost;

        # SSL/TLS Certificates
        ssl_certificate /etc/nginx/certs/localhost.crt;
        ssl_certificate_key /etc/nginx/certs/localhost.key;

        # SSL/TLS Protocols & Ciphers (Hardened Profile)
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # Kiểm tra WAF trước khi xử lý request
        if ($waf_blocked) {
            return 403 "Blocked by Nextflow WAF: Security Violation Detected.";
        }

        # 1. Route Frontend (React Web Admin Console)
        location / {
            proxy_pass http://frontend:80/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 2. Route Mobile Field App Simulator
        location /mobile {
            # Rewrite để loại bỏ prefix /mobile khi chuyển tiếp tới container mobile
            rewrite ^/mobile(?:/(.*))?$ /$1 break;
            proxy_pass http://mobile:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 3. Route API Backend (Rust API Server)
        location /api {
            proxy_pass http://backend:8000/api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 4. Route WebSockets (Rust PubSub Handler)
        location /ws {
            proxy_pass http://backend:8000/ws;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # 5. Route Prometheus metrics
        location /metrics {
            # Giới hạn truy cập chỉ cho Prometheus container hoặc localhost
            # allow 172.16.0.0/12; (hoặc dải IP internal docker)
            proxy_pass http://backend:8000/metrics;
            proxy_set_header Host $host;
        }
    }

    # =========================================================================
    # 4 PORTS FOR 4 LAYERS (SME BOUNDARIES SANITY PROFILE)
    # =========================================================================

    # Layer 1: Platform Admin (Port 8081)
    server {
        listen 8081;
        server_name localhost;

        # Chỉ cho phép truy cập từ Local/VPN
        allow 127.0.0.1;
        allow 192.168.0.0/16;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        deny all;

        # Kiểm tra WAF trước khi xử lý request
        if ($waf_blocked) {
            return 403 "Blocked by Nextflow WAF: Security Violation Detected.";
        }

        # Redirect root to Layer 1 home
        location = / {
            return 302 /platform/admin;
        }

        # Proxy to Frontend for all other paths (including assets, react-router)
        location / {
            proxy_pass http://frontend:80/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Proxy Backend API
        location /api {
            proxy_pass http://backend:8000/api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Proxy WebSockets
        location /ws {
            proxy_pass http://backend:8000/ws;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # Layer 2: Tenant Admin (Port 8082)
    server {
        listen 8082;
        server_name localhost;

        # Kiểm tra WAF trước khi xử lý request
        if ($waf_blocked) {
            return 403 "Blocked by Nextflow WAF: Security Violation Detected.";
        }

        # Redirect root to Layer 2 home
        location = / {
            return 302 /tenant/admin;
        }

        # Proxy to Frontend for all other paths (including assets, react-router)
        location / {
            proxy_pass http://frontend:80/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Proxy Backend API
        location /api {
            proxy_pass http://backend:8000/api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Proxy WebSockets
        location /ws {
            proxy_pass http://backend:8000/ws;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # Layer 3: Tenant Staff Workspace (Port 8083)
    server {
        listen 8083;
        server_name localhost;

        # Kiểm tra WAF trước khi xử lý request
        if ($waf_blocked) {
            return 403 "Blocked by Nextflow WAF: Security Violation Detected.";
        }

        # Redirect root to Layer 3 home
        location = / {
            return 302 /workspace;
        }

        # Proxy to Frontend for all other paths (including assets, react-router)
        location / {
            proxy_pass http://frontend:80/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Proxy Backend API
        location /api {
            proxy_pass http://backend:8000/api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Proxy WebSockets
        location /ws {
            proxy_pass http://backend:8000/ws;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # Layer 4: End Customer Portal (Port 8084)
    server {
        listen 8084;
        server_name localhost;

        # Kiểm tra WAF trước khi xử lý request
        if ($waf_blocked) {
            return 403 "Blocked by Nextflow WAF: Security Violation Detected.";
        }

        # Redirect root to Layer 4 home
        location = / {
            return 302 /customer;
        }

        # Proxy to Frontend for all other paths (including assets, react-router)
        location / {
            proxy_pass http://frontend:80/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Proxy Backend API
        location /api {
            proxy_pass http://backend:8000/api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
