version: '3.8'

services:
  # 1. Cơ sở dữ liệu PostgreSQL runtime
  db:
    image: postgres:16
    container_name: nextflow-postgres-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: nextflow_db
    ports:
      - "5435:5432"
    volumes:
      - nextflow_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nextflow_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. Rust Core Backend API Server
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nextflow-rust-backend
    environment:
      - DATABASE_URL=postgres://postgres:postgres@db:5432/nextflow_db
      - RUST_LOG=info
      - AI_SERVICE_URL=http://ai-service:8001
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  # 3. Web Admin Console (Frontend)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nextflow-web-admin
    ports:
      - "5173:80"
    depends_on:
      - backend

  # 4. Mobile Field App Simulator
  mobile:
    build:
      context: ./mobile
      dockerfile: Dockerfile
    container_name: nextflow-mobile-simulator
    ports:
      - "5174:80"
    depends_on:
      - backend

  # 5. ETL Pipeline Runner — Phase 5: Data Pipeline & Analytics Lakehouse
  etl-runner:
    build:
      context: ./etl
      dockerfile: Dockerfile
    container_name: nextflow-etl-runner
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/nextflow_db
      - ETL_BATCH_SIZE=500
      - ETL_INTERVAL_SECONDS=300
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # 5b. Python AI Service Microservice
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: nextflow-ai-service
    ports:
      - "8001:8001"
    environment:
      - CLOUDFLARE_ACCOUNT_ID=a9d75034ac3aac84e09dc47483175989
      - CLOUDFLARE_API_TOKEN=your_cloudflare_token_here
      - CLOUDFLARE_MODEL=@cf/meta/llama-3.1-8b-instruct
      - GEMINI_API_KEY=your_gemini_api_key_here
      - AI_SERVICE_PORT=8001
    volumes:
      - ./docs:/app/docs:ro
    restart: unless-stopped

  # 6. Nginx HTTPS Reverse Proxy with WAF
  reverse-proxy:
    image: nginx:alpine
    container_name: nextflow-reverse-proxy
    ports:
      - "80:80"
      - "443:443"
      - "8081:8081"
      - "8082:8082"
      - "8083:8083"
      - "8084:8084"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - frontend
      - mobile
      - backend

  # 7. Prometheus Metrics Collection
  prometheus:
    image: prom/prometheus:latest
    container_name: nextflow-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./devops/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - backend

  # 8. Grafana Metrics Visualization
  grafana:
    image: grafana/grafana:latest
    container_name: nextflow-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./devops/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./devops/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./devops/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

volumes:
  nextflow_postgres_data:

