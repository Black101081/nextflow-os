server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;

    # Determine which HTML file to serve for SPA routing based on the X-App header
    # passed by the outer reverse proxy
    set $app_html "staff.html"; # default to staff workspace
    if ($http_x_app = "platform") { set $app_html "platform.html"; }
    if ($http_x_app = "leader") { set $app_html "leader.html"; }
    if ($http_x_app = "staff") { set $app_html "staff.html"; }
    if ($http_x_app = "customer") { set $app_html "customer.html"; }

    location / {
        try_files $uri $uri/ @webapp;
    }

    location @webapp {
        rewrite ^ /$app_html break;
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public";
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
